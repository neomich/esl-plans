<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESLplans - Zero-prep Lesson Plans for Online ESL Tutors</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f7f9fa;
            color: #333;
        }

        header {
            background-color: #c95210; 
            color: white;
            padding: 20px 10px 40px 10px;
            text-align: center;
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto 30px auto;
            background-color: white;
            border-radius: 35px;
            padding: 12px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex-wrap: wrap;
        }

        .logo {
            font-size: 32px; 
            font-weight: 400;
            color: #000;
            letter-spacing: -0.5px;
        }
        .logo strong {
            font-weight: 800;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 10px;
            align-items: center;
        }

        .nav-menu a {
            text-decoration: none;
            color: #444;
            font-weight: 600;
            font-size: 16px;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.2s ease;
            background-color: transparent;
        }

        .nav-menu a:hover, 
        .nav-menu a:active {
            background-color: #c95210;
            color: white;
        }

        .hero-text {
            font-size: 22px;
            font-weight: 400;
            margin: 0 auto 25px auto;
            max-width: 950px; 
            line-height: 1.4;
        }

        .search-box {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            background-color: white;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .search-box input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            outline: none;
            font-size: 15px;
        }

        .search-box button {
            background-color: #ff7300;
            color: white;
            border: none;
            padding: 0 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .search-box button:hover {
            background-color: #e06500;
        }

        main {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .feed-heading {
            font-size: 28px;
            margin-bottom: 25px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo"><strong>ESL</strong>plans</div>
            <ul class="nav-menu">
                <li><a href="#">Levels</a></li>
                <li><a href="#">Categories</a></li>
                <li><a href="#">Topic Suggestions</a></li>
                <li><a href="#">Pricing</a></li>
                <li><a href="#">Login</a></li>
            </ul>
        </div>

        <!-- New snappy headline applied here -->
        <p class="hero-text">Zero-prep, conversation-driven lesson plans for online ESL tutors!</p>

        <div class="search-box">
            <input type="text" placeholder="Search: food, description, lesson plan content...">
            <button type="button">Find materials</button>
        </div>
    </header>

    <main>
        <h2 class="feed-heading">Latest Lessons</h2>
        <!-- Lesson grid container goes here -->
    </main>

</body>
</html>
