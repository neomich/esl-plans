<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESLplans - Conversation-Driven Lesson Plans</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #fffaf5; color: #333; }
        header { background-color: #c95210; padding: 20px; text-align: center; }
        .nav-container { max-width: 1100px; margin: 0 auto; background-color: white; border-radius: 35px; padding: 10px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo { font-size: 28px; }
        .hero { background-color: #c95210; padding: 40px 20px; text-align: center; color: white; }
        .search-box { display: flex; max-width: 600px; margin: 20px auto 0; background: white; border-radius: 8px; overflow: hidden; }
        .search-box input { flex: 1; padding: 15px; border: none; outline: none; }
        .search-box button { background: #ff7a00; color: white; border: none; padding: 0 30px; cursor: pointer; }
        .content { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 20px; flex-grow: 1; }
        .card-title { font-weight: bold; margin-bottom: 10px; }
        .btn { display: block; text-align: center; background: #ff7a00; color: white; padding: 10px; border-radius: 20px; text-decoration: none; margin-top: 15px; }
        .workspace { display: grid; grid-template-columns: 300px 1fr; gap: 40px; }
        .media-icons { display: flex; gap: 15px; margin-top: 20px; }
    </style>
</head>
<body>
    <header><div class="nav-container"><div class="logo"><strong>ESL</strong>plans</div></div></header>
    <div class="hero">
        <h2>Zero-prep, conversation-driven lesson plans for online ESL tutors!</h2>
        <div class="search-box"><input type="text" placeholder="Search lessons..."><button>Find materials</button></div>
    </div>

    <div class="content" id="catalog-view">
        <h2 style="margin-bottom:20px;">Latest Lessons</h2>
        <div class="grid" id="lesson-grid"></div>
    </div>

    <div class="content" id="detail-view" style="display:none;">
        <div class="workspace">
            <div class="card" id="side-card"></div>
            <div id="lesson-content"></div>
        </div>
    </div>

    <script>
        const lessons = [
            { id: 1, title: "Modern Remakes Of Famous Paintings", level: "B1", type: "Audio", icon: "🎵", img: "1as.JPG", desc: "In this lesson, students explore various art forms...", objectives: ["Identify and categorize art types", "Practice prepositions", "Discuss modern remakes"], pdf: "#", mp3: "#" },
            { id: 2, title: "What's The Most Popular Age To Be?", level: "B1", type: "Video", icon: "▶️", img: "2as.JPG", desc: "In this lesson, students explore common stereotypes...", objectives: ["Discuss stereotypes", "Debate ageing", "Watch video"], pdf: "#", video: "#" }
        ];

        function renderGrid() {
            const grid = document.getElementById('lesson-grid');
            grid.innerHTML = lessons.map((l, i) => `
                <div class="card">
                    <img src="${l.img}">
                    <div class="card-body">
                        <div class="card-title">${l.title}</div>
                        <div>${l.icon} ${l.type}</div>
                        <div>🥇 ${l.level} | 🕒 90 min</div>
                        <a href="#" class="btn" onclick="showDetail(${i})">View Lesson</a>
                    </div>
                </div>
            `).join('');
        }

        function showDetail(i) {
            const l = lessons[i];
            document.getElementById('catalog-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            document.getElementById('side-card').innerHTML = `<img src="${l.img}"><div class="card-body"><div class="card-title">${l.title}</div><div>${l.icon} ${l.type}</div><div>🥇 ${l.level}</div></div>`;
            document.getElementById('lesson-content').innerHTML = `
                <h1>${l.title}</h1>
                <ul>${l.objectives.map(o => `<li>${o}</li>`).join('')}</ul>
                <p>${l.desc}</p>
                <div class="media-icons">
                    ${l.pdf ? `<a href="${l.pdf}" class="btn" style="background:#d9534f">PDF</a>` : ''}
                    ${l.mp3 ? `<a href="${l.mp3}" class="btn">MP3</a>` : ''}
                    ${l.video ? `<a href="${l.video}" class="btn">Video</a>` : ''}
                </div>
                <button class="btn" onclick="location.reload()">Go Back</button>
            `;
        }
        renderGrid();
    </script>
</body>
</html>
