  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

786;\">/yr<\u002Fspan><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ pricingFriendClick }}\" style=\"{{ pricingFriendStyle }}\">{{ pricingFriendLabel }}<\u002Fbutton>\n          <div style=\"width:100%; height:1px; background:#eee1cd; margin:22px 0;\"><\u002Fdiv>\n          <ul style=\"list-style:none; padding:0; margin:0; width:100%; text-align:left; display:flex; flex-direction:column; gap:16px; font-size:14.5px; color:#3a3733;\">\n            <li>Everything in Contributor, plus bi-weekly exclusive updates.<\u002Fli>\n            <li>Personal teaching planner app <em>(coming soon)<\u002Fem>.<\u002Fli>\n<li>A 30-minute 1:1 mentorship session on Zoom. <span style=\"color:#a19786; font-size:12.5px;\">🔒 Link available after purchase<\u002Fspan><\u002Fli>\n            <li>Private Friends chat — priority questions &amp; support. <span style=\"color:#a19786; font-size:12.5px;\">🔒 Link available after purchase<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:24px; border-top:1px solid #eee1cd; padding-top:36px;\">\n        <div style=\"display:flex; align-items:center; gap:14px;\"><span style=\"width:46px; height:46px; background:#f0fae1; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#56633f\" stroke-width=\"2.3\"><path d=\"M4 5.5c3-1 6-1 8 .5v13c-2-1.5-5-1.5-8-.5z\"><\u002Fpath><path d=\"M20 5.5c-3-1-6-1-8 .5v13c2-1.5 5-1.5 8-.5z\"><\u002Fpath><\u002Fsvg><\u002Fspan><div style=\"font-size:14px; color:#3a3733;\"><strong>New lessons<\u002Fstrong><br>2 per week<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:14px;\"><span style=\"width:46px; height:46px; background:#f0fae1; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#56633f\" stroke-width=\"2.3\"><path d=\"M2 9l10-5 10 5-10 5-10-5Z\"><\u002Fpath><path d=\"M6 11.5V16c0 1.5 2.8 3 6 3s6-1.5 6-3v-4.5\"><\u002Fpath><\u002Fsvg><\u002Fspan><div style=\"font-size:14px; color:#3a3733;\"><strong>Created by a practicing<\u002Fstrong><br>online ESL teacher<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:14px;\"><span style=\"width:46px; height:46px; background:#f0fae1; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#56633f\" stroke-width=\"2.3\"><path d=\"M6 2h9l5 5v15H6z\"><\u002Fpath><path d=\"M15 2v5h5\"><\u002Fpath><\u002Fsvg><\u002Fspan><div style=\"font-size:14px; color:#3a3733;\"><strong>50+ lesson plans<\u002Fstrong><br>and growing<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:14px;\"><span style=\"width:46px; height:46px; background:#f0fae1; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#56633f\" stroke-width=\"2.3\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><line x1=\"3\" y1=\"12\" x2=\"21\" y2=\"12\"><\u002Fline><path d=\"M12 3a15 15 0 0 1 0 18a15 15 0 0 1 0-18Z\"><\u002Fpath><\u002Fsvg><\u002Fspan><div style=\"font-size:14px; color:#3a3733;\"><strong>Used by teachers<\u002Fstrong><br>worldwide<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"text-align:center; margin-top:34px; padding-top:24px; border-top:1px solid #eee1cd;\">\n        <p style=\"font-size:13px; color:#a19786;\">By purchasing you agree to our <a href=\"docs/terms.html\" target=\"_blank\" style=\"color:#c67139; font-weight:600;\">Terms of Service<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ CONTACTS ============ -->\n  <sc-if value=\"{{ showContacts }}\" hint-placeholder-val=\"{{ false }}\">\n    <main style=\"max-width:900px; margin:0 auto; padding:50px 24px 70px;\">\n      <h2 style=\"text-align:center; font-family:'Caprasimo',serif; font-weight:400; font-size:32px; margin:0 0 34px;\"><span style=\"color:#c67139;\">ESL<\u002Fspan>-plans — Welcome!<\u002Fh2>\n      <div style=\"display:flex; gap:36px; align-items:flex-start; flex-wrap:wrap; margin-bottom:40px; justify-content:center;\">\n        <div style=\"flex-shrink:0;\"><img src=\"142db951-463f-4ccf-acdd-81c3d770162c\" alt=\"Alex\" style=\"width:210px; height:auto; max-height:420px; border-radius:24px; object-fit:cover; object-position:center top; box-shadow:0 8px 24px rgba(46,43,37,0.18); filter:saturate(0.75) contrast(0.92) brightness(1.05);\"><\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:16px; flex:1; min-width:280px; max-width:560px;\">\n          <p style=\"font-size:16px; color:#3a3733; line-height:1.75; margin:0;\">Hi there, I'm <strong>Alex!<\u002Fstrong> Back when I was a student, a teacher of mine used to scribble on the board: <em>\"Learn without learning!\"<\u002Fem> It completely flipped my perspective on education. I followed in those footsteps and became an English tutor myself — until I thought, why not turn the tables? <em>\"Teach without teaching!\"<\u002Fem> I've spent the last <strong>15 years<\u002Fstrong> \"not teaching\" and having a blast instead. The truth is, if you're actually having fun in class, there's always going to be a room full of smiling faces waiting for you.<\u002Fp>\n          <p style=\"font-size:16px; color:#3a3733; line-height:1.75; margin:0;\">Sure, I've slogged through all the textbooks we love to hate, but it didn't take long to realize you don't need to be a disciple of <em>Spotlight<\u002Fem> or <em>English File.<\u002Fem> Instead, I build my own unique ESL plans filled with <strong>original topics<\u002Fstrong> and a healthy spoonful of <strong>weirdness and quirks!<\u002Fstrong> Love it or hate it, that's my style.<\u002Fp>\n          <p style=\"font-size:16px; color:#3a3733; line-height:1.75; margin:0;\">My goal is to help you <strong>break out of that rigid tutor routine<\u002Fstrong> and inspire you to create your own worlds. Our profession offers unmatched freedom and the chance to build genuine bonds with our students — no, wait, I call them <strong><em>\"friends!\"<\u002Fem><\u002Fstrong><\u002Fp>\n          <p style=\"font-size:16px; color:#3a3733; line-height:1.75; margin:0;\">Please consider <strong>subscribing to the ESL-plans library<\u002Fstrong> and joining our community channels! I'm a one-man band, and since each plan takes me up to <strong>6 hours<\u002Fstrong> to craft, your support gives me the time I need to keep creating these resources!<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:center;\">\n        <p style=\"font-size:16px; color:#645c50; margin-bottom:20px;\">Join our community chats — won't miss any new ESLplans!<\u002Fp>\n        <div style=\"display:flex; justify-content:center; gap:16px; flex-wrap:wrap;\">\n          <a href=\"https://t.me/eslplans\" target=\"_blank\" style=\"display:inline-flex; align-items:center; gap:10px; background:#229ED9; color:#fff; text-decoration:none; padding:14px 28px; border-radius:999px; font-size:16px; font-weight:700;\">\n            <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"white\"><path d=\"M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.96 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49- {{ false }}\">\n    <main style=\"max-width:1180px; margin:0 auto; padding:50px 24px 70px;\">\n      <h2 style=\"font-family:'Caprasimo',serif; font-weight:400; font-size:28px; margin:0 0 24px; display:flex; align-items:center; gap:10px;\">\n        <svg width=\"24\" height=\"24\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#c67139\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"3\"><\u002Fcircle><\u002Fsvg>\n        Pinned Lessons\n      <\u002Fh2>\n      <sc-if value=\"{{ pinnedEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"color:#82796a; font-size:16px;\">No pinned lessons yet. Open a lesson and tap \"Pin it!\" to save it here.<\u002Fp>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ pinnedNotEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:26px;\">\n          <sc-for list=\"{{ pinnedLessons }}\" as=\"item\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff; border-radius:26px; overflow:hidden; box-shadow:0 3px 10px rgba(46,43,37,0.1); display:flex; flex-direction:column;\">\n              <div style=\"height:140px; width:100%; background:{{ item.artBg }}; background-image:radial-gradient(rgba(255,255,255,0.16) 2px, transparent 2px), {{ item.artBg }}; background-size:18px 18px, 100% 100%; display:flex; align-items:center; justify-content:center; position:relative;\">\n                <img src=\"{{ item.imgSrc }}\" sc-camel-on-error=\"{{ hideImgOnError }}\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover;\">\n                              <\u002Fdiv>\n              <div style=\"padding:16px 18px 8px;\">\n                <div style=\"font-family:'Caprasimo',serif; font-size:17px; color:#201e1d; margin-bottom:10px;\">{{ item.title }}<\u002Fdiv>\n 22px;\"><span style=\"color:#c67139;\">ESL<\u002Fspan>-plans<\u002Fdiv>\n\n        <sc-if value=\"{{ authModeIsCore }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex; background:#f9f4ed; border-radius:12px; padding:4px; margin-bottom:22px;\">\n            <button sc-camel-on-click=\"{{ switchToSignin }}\" style=\"{{ tabSigninStyle }}\">Sign In<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ switchToSignup }}\" style=\"{{ tabSignupStyle }}\">Sign Up<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ authError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fdf1f1; border:1px solid #f3a5a5; color:#b3261e; border-radius:10px; padding:10px 14px; font-size:13.5px; margin-bottom:16px;\">{{ authError }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ authSuccess }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#f0fae1; border:1px solid #ccdbb2; color:#3d472b; border-radius:10px; padding:10px 14px; font-size:13.5px; margin-bottom:16px;\">{{ authSuccess }}<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ authModeIsCore }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"margin-bottom:16px;\">\n              <label style=\"display:block; font-size:12px; font-weight:700; color:#645c50; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;\">Email<\u002Flabel>\n              <input type=\"email\" value=\"{{ authEmailVal }}\" sc-camel-on-change=\"{{ onAuthEmailChange }}\" placeholder=\"your@email.com\" style=\"width:100%; padding:12px 16px; border:1.5px solid #dcd3c4; border-radius:999px; font-size:15px; outline:none; box-sizing:border-box;\">\n            <\u002Fdiv>\n            <div style=\"margin-bottom:8px;\">\n              <label style=\"display:block; font-size:12px; font-weight:700; color:#645c50; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;\">Password<\u002Flabel>\n              <div style=\"position:relative; display:flex; align-items:center;\">\n                <input type=\"{{ authPassInputType }}\" value=\"{{ authPasswordVal }}\" sc-camel-on-change=\"{{ onAuthPasswordChange }}\" placeholder=\"••••••••\" style=\"flex:1; padding:12px 44px 12px 16px; border:1.5px solid #dcd3c4; border-radius:999px; font-size:15px; outline:none; box-sizing:border-box;\">\n                <button type=\"button\" sc-camel-on-click=\"{{ toggleAuthPassVisible }}\" style=\"position:absolute; right:14px; background:none; border:none; cursor:pointer; font-size:15px; color:#82796a;\">👁<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"text-align:right; margin-top:6px;\">\n                <a sc-camel-on-click=\"{{ showForgotPassword }}\" style=\"font-size:13px; color:#c67139; cursor:pointer; text-decoration:none;\">Forgot password?<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ isSignupMode }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-bottom:16px;\">\n                <label style=\"display:block; font-size:12px; font-weight:700; color:#645c50; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;\">Confirm Password<\u002Flabel>\n                <input type=\"password\" value=\"{{ authConfirmVal }}\" sc-camel-on-change=\"{{ onAuthConfirmChange }}\" placeholder=\"••••••••\" style=\"width:100%; padding:12px 16px; border:1.5px solid #dcd3c4; border-radius:999px; font-size:15px; outline:none; box-sizing:border-box;\">\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <button sc-camel-on-click=\"{{ handleAuth }}\" disabled=\"{{ authSubmitting }}\" style=\"width:100%; background:#c67139; color:#fff2eb; border:none; border-radius:999px; padding:14px; font-size:16px; font-weight:800; cursor:pointer; margin-top:8px; font-family:'Caprasimo',serif;\">{{ authSubmitLabel }}<\u002Fbutton>\n            <p style=\"text-align:center; font-size:14px; color:#82796a; margin-top:16px;\">{{ authSwitchPrompt }} <a sc-camel-on-click=\"{{ authSwitchAction }}\" style=\"color:#c67139; cursor:pointer;\">{{ authSwitchLinkText }}<\u002Fa><\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isForgotMode }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <p style=\"font-size:14px; color:#645c50; margin-bottom:16px;\">Enter your email and we'll send you a reset link.<\u002Fp>\n            <div style=\"margin-bottom:16px;\">\n              <label style=\"display:block; font-size:12px; font-weight:700; color:#645c50; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;\">Email<\u002Flabel>\n              <input type=\"email\" value=\"{{ forgotEmailVal }}\" sc-camel-on-change=\"{{ onForgotEmailChange }}\" placeholder=\"your@email.com\" style=\"width:100%; padding:12px 16px; border:1.5px solid #dcd3c4; border-radius:999px; font-size:15px; outline:none; box-sizing:border-box;\">\n            <\u002Fdiv>\n            <button sc-camel-on-click=\"{{ handleForgotPassword }}\" style=\"width:100%; background:#c67139; color:#fff2eb; border:none; border-radius:999px; padding:14px; font-size:16px; font-weight:800; cursor:pointer; font-family:'Caprasimo',serif;\">Send Reset Link<\u002Fbutton>\n            <p style=\"text-align:center; font-size:14px; color:#82796a; margin-top:16px;\"><a sc-camel-on-click=\"{{ showSignInForm }}\" style=\"color:#c67139; cursor:pointer;\">← Back to Sign In<\u002Fa><\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isResetMode }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <p style=\"font-size:14px; color:#645c50; margin-bottom:16px;\">Choose a new password for your account.<\u002Fp>\n            <div style=\"margin-bottom:16px;\">\n              <label style=\"display:block; font-size:12px; font-weight:700; color:#645c50; margin-bottom:6px; text-transform: 'linear-gradient(135deg,#f6a06b,#c67139)',\n  business: 'linear-gradient(135deg,#d67f48,#8c491a)',\n  technology: 'linear-gradient(135deg,#8fa073,#56633f)',\n  society: 'linear-gradient(135deg,#ccdbb2,#7a8a5e)',\n  life: 'linear-gradient(135deg,#ffc6a5,#d67f48)',\n  food: 'linear-gradient(135deg,#f6a06b,#b2622d)',\n  travel: 'linear-gradient(135deg,#aebf92,#56633f)',\n  art: 'linear-gradient(135deg,#ffe1d0,#c67139)',\n  work: 'linear-gradient(135deg,#c0b6a5,#82796a)',\n  media: 'linear-gradient(135deg,#e1eecc,#8fa073)',\n  grammar: 'linear-gradient(135deg,#dcd3c4,#a19786)'\n};\n\nconst ICON_KEYS = ['general','psychology','business','technology','society','life','food','travel','art','work','media','grammar'];\nfunction iconFlags(key) {\n  const out = {};\n  ICON_KEYS.forEach(k => { out['icon_' + k] = (key === k) || (key !== undefined && !ICON_KEYS.includes(key) && k === 'general'); });\n  return out;\n}\n\nclass Component extends DCLogic {\n  state = {\n    view: 'dashboard',\n    currentLessonIndex: null,\n    filters: { level: 'all', topic: 'all' },\n    page: 1,\n    pinnedIds: JSON.parse(localStorage.getItem('eslplans-pinned') || '[]'),\n    pinnedPage: 1,\n    pinAnimTick: 0,\n    isMobile: (typeof window !== 'undefined' && window.innerWidth < 860),\n    mobileMenuOpen: false,\n    userMenuOpen: false,\n    shareOpen: false,\n    authOpen: false,\n    authMode: 'signin',\n    authError: '',\n    authSuccess: '',\n    authSubmitting: false,\n    authPassVisible: false,\n    currentUser: null,\n    authEmailVal: '', authPasswordVal: '', authConfirmVal: '',\n    forgotEmailVal: '',\n    newPasswordVal: '', newPasswordConfirmVal: '',\n    copyBtnLabel: 'Copy'\n  };\n\n  pdfBoxRef = React.createRef();\n\n  componentDidMount() {\n    if (typeof window === 'undefined') return;\n    this._onResize = () => this.setState({ isMobile: window.innerWidth < 860 });\n    window.addEventListener('resize', this._onResize);\n\n    this.loadScript('lessons.js', () => { this.forceUpdate(); });\n\n    this.loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2', () => {\n      if (!window.supabase) return;\n      this.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);\n      this.supabase.auth.getSession().then(({ data }) => {\n        if (data && data.session) this.setLoggedIn(data.session.user);\n      }).catch(() => {});\n      this.supabase.auth.onAuthStateChange((event, session) => {\n        if (event === 'PASSWORD_RECOVERY') { this.setState({ authOpen: true, authMode: 'reset' }); return; }\n        if (event === 'SIGNED_IN' && session) this.setLoggedIn(session.user);\n        if (event === 'SIGNED_OUT') this.setState({ currentUser: null });\n      });\n    });\n\n    this._pdfLibTimer = setTimeout(() => {\n      if (!window.pdfjsLib) {\n        this.pdfLibFailed = true;\n        if (this.state.view === 'detail') this.showPdfFallback();\n      }\n    }, 6000);\n    this.loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js', () => {\n      if (!window.pdfjsLib) { this.pdfLibFailed = true; if (this.state.view === 'detail') this.showPdfFallback(); return; }\n      clearTimeout(this._pdfLibTimer);\n      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';\n      if (this.state.view === 'detail' && this.state.currentLessonIndex !== null) this.renderPdfPreview();\n    });\n\n    const hash = window.location.hash || '';\n    const m = hash.match(/lesson-(\\d+)/);\n    if (m) this.initiateDetailViewByIndex(parseInt(m[1], 10));\n  }\n\n  loadScript(src, onload) {\n    const s = document.createElement('script');\n    s.src = src; s.async = true;\n    s.onload = onload;\n    s.onerror = () => {};\n    document.head.appendChild(s);\n  }\n\n  componentWillUnmount() {\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n  }\n\n  componentDidUpdate(prevProps, prevState) {\n    if (this.state.view === 'detail' && this.state.currentLessonIndex !== null &&\n        (prevState.view !== 'detail' || prevState.currentLessonIndex !== this.state.currentLessonIndex)) {\n      this.renderPdfPreview();\n    }\n  }\n\n  async setLoggedIn(user) {\n    let profile_tier = 'free', profile_data = null;\n    try {\n      if (this.supabase) {\n        const { data } = await this.supabase.from('profiles').select('tier, expires_at').eq('id', user.id).single();\n        if (data) { profile_tier = data.tier; profile_data = data; }\n      }\n    } catch (e) {}\n    this.setState({ currentUser: { ...user, profile_tier, profile_data } });\n  }\n\n  showPdfFallback() {\n    const box = this.pdfBoxRef.current;\n    if (!box) return;\n    box.innerHTML = '<div style=\"color:#82796a;font-size:14px;padding:30px 20px;text-align:center;\">Preview unavailable — <a href=\"' + (lessonsCatalog[this.state.currentLessonIndex] ? lessonsCatalog[this.state.currentLessonIndex].pdfUrl : '#') + '\" target=\"_blank\" style=\"color:#c67139;font-weight:700;\">open the PDF directly<\u002Fa>.<\u002Fdiv>';\n  }\n\n  renderPdfPreview() {\n    const box = this.pdfBoxRef.current;\n    if (!box || typeof lessonsCatalog === 'undefined') return;\n    if (this.pdfLibFailed || !window.pdfjsLib) { this.showPdfFallback(); return; }\n    box.innerHTML = '<div style=\"color:#82796a;font-size:14px;padding:40px 0;\">Loading preview…<\u002Fdiv>';\n    const lesson = lessonsCatalog[this.state.currentLessonIndex];\n    if (!lesson) return;\n    const myLessonIndex = this.state.currentLessonIndex;\n    const timeoutMs = 9000;\n    let settled = false;\n    const timer = setTimeout(() => {\n      if (settled) return;\n      settled = true;\n      if (this.state.currentLessonIndex === myLessonIndex) this.showPdfFallback();\n    }, timeoutMs);\n    window.pdfjsLib.getDocument(lesson.pdfUrl).promise.then((pdf) => {\n      if (settled) return;\n      settled = true; clearTimeout(timer);\n      box.innerHTML = '';\n      const scale = 0.42;\n      const renderPage = (n) => {\n        pdf.getPage(n).then((page) => {\n          const viewport = page.getViewport({ scale });\n          const canvas = document.createElement('canvas');\n          canvas.width = viewport.width; canvas.height = viewport.height;\n          canvas.style.width = '100%'; canvas.style.height = 'auto';\n          canvas.style.borderRadius = '10px'; canvas.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';\n          page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise.then(() => {\n            box.appendChild(canvas);\n            if (n < pdf.numPages) renderPage(n + 1);\n          });\n        });\n      };\n      renderPage(1);\n    }).catch(() => {\n      if (settled) return;\n      settled = true; clearTimeout(timer);\n      this.showPdfFallback();\n    });\n  }\n\n  levelInRange(lessonLevel, filterLevel) {\n    if (filterLevel === 'all') return true;\n    const parts = lessonLevel.toLowerCase().split(/[-\\/]/).map(s => s.trim());\n    if (parts.length === 1) return parts[0] === filterLevel;\n    const startIdx = LEVEL_ORDER.indexOf(parts[0]);\n    const endIdx = LEVEL_ORDER.indexOf(parts[parts.length - 1]);\n    const filterIdx = LEVEL_ORDER.indexOf(filterLevel);\n    return filterIdx >= startIdx && filterIdx <= endIdx;\n  }\n\n  computeFiltered() {\n    if (typeof lessonsCatalog === 'undefined') return [];\n    const { level, topic } = this.state.filters;\n    const out = [];\n    lessonsCatalog.forEach((lesson, index) => {\n      const matchesLevel = level === 'all' || this.levelInRange(lesson.level, level);\n      const matchesTopic = topic === 'all' ? true : topic === 'free' ? lesson.isFree === true : (lesson.topics || []).includes(topic);\n      if (matchesLevel && matchesTopic) out.push(index);\n    });\n    return out;\n  }\n\n  showDashboardView = () => this.setState({ view: 'dashboard', filters: { level: 'all', topic: 'all' }, page: 1, mobileMenuOpen: false });\n  showPricingView = () => this.setState({ view: 'pricing', mobileMenuOpen: false });\n  showContactsView = () => this.setState({ view: 'contacts', mobileMenuOpen: false });\n  showPinnedView = () => this.setState({ view: 'pinned', pinnedPage: 1, mobileMenuOpen: false });\n  goBackToCatalog = () => { this.setState({ view: 'dashboard' }); window.scrollTo(0, 0); };\n\n  initiateDetailViewByIndex = (index) => {\n    this.setState({ view: 'detail', currentLessonIndex: index });\n    window.scrollTo(0, 0);\n  };\n\n  applyTopicFilter = (topic) => this.setState((s) => ({ view: 'dashboard', filters: { ...s.filters, topic }, page: 1 }));\n  applyPillFilter = (level) => this.setState((s) => ({ filters: { ...s.filters, level }, page: 1 }));\n  goToPage = (p) => { this.setState({ page: p }); window.scrollTo(0, 0); };\n  pinnedGoToPage = (p) => { this.setState({ pinnedPage: p }); window.scrollTo(0, 0); };\n\n  toggleMobileMenu = () => this.setState((s) => ({ mobileMenuOpen: !s.mobileMenuOpen }));\n  closeMobileMenu = () => this.setState({ mobileMenuOpen: false });\n  toggleUserMenu = () => this.setState((s) => ({ userMenuOpen: !s.userMenuOpen }));\n\n  togglePin = () => {\n    if (!this.state.currentUser) {\n      this.setState({ authOpen: true, authMode: 'signup', authSuccess: 'Create a free account to pin and save your favourite lessons!' });\n      return;\n    }\n    const idx = this.state.currentLessonIndex;\n    if (idx === null) return;\n    this.setState((s) => {\n      const has = s.pinnedIds.includes(idx);\n      const pinnedIds = has ? s.pinnedIds.filter(i => i !== idx) : [...s.pinnedIds, idx];\n      localStorage.setItem('eslplans-pinned', JSON.stringify(pinnedIds));\n      return { pinnedIds, pinAnimTick: s.pinAnimTick + 1 };\n    });\n  };\n\n  openShareModal = () => this.setState({ shareOpen: true, copyBtnLabel: 'Copy' });\n  closeShareModal = () => this.setState({ shareOpen: false });\n  copyShareLink = () => {\n    const idx = this.state.currentLessonIndex;\n    const url = `${window.location.origin}${window.location.pathname}#lesson-${idx}`;\n    navigator.clipboard.writeText(url).then(() => {\n      this.setState({ copyBtnLabel: 'Copied!' });\n      setTimeout(() => this.setState({ copyBtnLabel: 'Copy' }), 1600);\n    }).catch(() => {});\n  };\n\n  openAuthModal = () => this.setState({ authOpen: true, mobileMenuOpen: false, authError: '', authSuccess: '' });\n  closeAuthModal = () => this.setState({ authOpen: false, authError: '', authSuccess: '', authMode: 'signin' });\n  switchTab = (mode) => this.setState({ authMode: mode, authError: '', authSuccess: '' });\n  showForgotPassword = () => this.setState({ authMode: 'forgot', authError: '', authSuccess: '' });\n  showSignInForm = () => this.setState({ authMode: 'signin', authError: '', authSuccess: '' });\n  toggleAuthPassVisible = () => this.setState((s) => ({ authPassVisible: !s.authPassVisible }));\n\n  handleAuth = async () => {\n    const { authEmailVal: email, authPasswordVal: password, authConfirmVal: confirm, authMode } = this.state;\n    if (!email || !password) { this.setState({ authError: 'Please fill in all fields.' }); return; }\n    if (authMode === 'signup' && password !== confirm) { this.setState({ authError: 'Passwords do not match.' }); return; }\n    if (!this.supabase) { this.setState({ authError: 'Auth service unavailable.' }); return; }\n    this.setState({ authSubmitting: true, authError: '' });\n    if (authMode === 'signin') {\n      const { error } = await this.supabase.auth.signInWithPassword({ email, password });\n      if (error) this.setState({ authError: error.message, authSubmitting: false });\n      else this.setState({ authOpen: false, authSubmitting: false });\n    } else {\n      const { error } = await this.supabase.auth.signUp({ email, password });\n      if (error) this.setState({ authError: error.message, authSubmitting: false });\n      else this.setState({ authSuccess: 'Check your email to confirm your account!', authSubmitting: false });\n    }\n  };\n\n  handleForgotPassword = async () => {\n    const email = this.state.forgotEmailVal.trim();\n    if (!email) { this.setState({ authError: 'Please enter your email.' }); return; }\n    if (!this.supabase) return;\n    const { error } = await this.supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + window.location.pathname.replace('index.html', 'reset.html') });\n    if (error) this.setState({ authError: error.message });\n    else this.setState({ authSuccess: 'Reset link sent! Check your email.', authError: '' });\n  };\n\n  handleSetNewPassword = async () => {\n    const { newPasswordVal, newPasswordConfirmVal } = this.state;\n    if (newPasswordVal.length < 6) { this.setState({ authError: 'Password must be at least 6 characters.' }); return; }\n    if (newPasswordVal !== newPasswordConfirmVal) { this.setState({ authError: 'Passwords do not match.' }); return; }\n    if (!this.supabase) return;\n    const { error } = await this.supabase.auth.updateUser({ password: newPasswordVal });\n    if (error) this.setState({ authError: error.message });\n    else this.setState({ authSuccess: 'Password updated!', authMode: 'signin' });\n  };\n\n  handleSignOut = async () => {\n    if (this.supabase) await this.supabase.auth.signOut();\n    this.setState({ currentUser: null, userMenuOpen: false });\n  };\n\n  handlePricingClick = (tier) => {\n    const { currentUser } = this.state;\n    const userTier = currentUser ? (currentUser.profile_tier || 'free') : null;\n    if (tier === 'guest') {\n      if (!currentUser) this.openAuthModal(); else this.showDashboardView();\n      return;\n    }\n    if (!currentUser) { this.openAuthModal(); return; }\n    if (userTier === tier || (tier === 'contributor' && userTier === 'friend')) return;\n    const urls = { contributor: 'https://payform.ru/noc13uv/', friend: 'https://payform.ru/pac13vl/' };\n    window.open(urls[tier], '_blank');\n  };\n\n  buildCard(idx, small) {\n    const lesson = (typeof lessonsCatalog !== 'undefined') ? lessonsCatalog[idx] : null;\n    if (!lesson) return { idx, title: '', categoryLabel: '', mediaType: '', levelLabel: '', duration: '', isFree: false, artBg: ART_BG.general, ...iconFlags('general'), accentBorder: '#f6a06b', accentText: '#8c491a', goDetail: () => {} };\n    const key = TOPIC_ICON_KEY(lesson);\n    const isBusiness = lesson.category === 'business';\n    return {\n      idx,\n      title: lesson.title,\n      categoryLabel: lesson.categoryLabel,\n      mediaType: (lesson.mediaType || '').replace('&amp;', '&'),\n      levelLabel: lesson.levelLabel,\n      duration: lesson.duration,\n      isFree: !!lesson.isFree,\n      artBg: ART_BG[key] || ART_BG.general,\n      imgSrc: lesson.visualSource || '',\n      ...iconFlags(key),\n      accentBorder: isBusiness ? '#aebf92' : '#f6a06b',\n      accentText: isBusiness ? '#3d472b' : '#8c491a',\n      goDetail: () => this.initiateDetailViewByIndex(idx)\n    };\n  }\n\n  buildPagination(current, total, onGo) {\n    const items = [];\n    const pill = (active, disabled) => `display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;font-size:15px;font-weight:700;cursor:${disabled ? 'default' : 'pointer'};user-select:none;background:${active ? '#c67139' : 'transparent'};color:${active ? '#fff2eb' : disabled ? '#c0b6a5' : '#8c491a'};opacity:${disabled ? 0.5 : 1};`;\n    items.push({ label: '‹', style: pill(false, current === 1), onClick: current > 1 ? () => onGo(current - 1) : undefined });\n    let pages;\n    if (total <= 7) pages = Array.from({ length: total }, (_, i) => i + 1);\n    else {\n      pages = [1];\n      if (current > 3) pages.push('...');\n      for (let p = Math.max(2, current - 1); p <= Math.min(total - 1, current + 1); p++) pages.push(p);\n      if (current < total - 2) pages.push('...');\n      pages.push(total);\n    }\n    pages.forEach((p) => {\n      if (p === '...') items.push({ label: '···', style: pill(false, true) });\n      else items.pus dSlice = s.pinnedIds.slice((pinnedPage - 1) * PINNED_PER_PAGE, pinnedPage * PINNED_PER_PAGE);\n    const pinnedLessons = pinnedSlice.map(i => this.buildCard(i, true));\n\n    let lessonVals = {};\n    if (s.view === 'detail' && s.currentLessonIndex !== null && typeof lessonsCatalog !== 'undefined' && lessonsCatalog[s.currentLessonIndex]) {\n      const lesson = lessonsCatalog[s.currentLessonIndex];\n      const key = TOPIC_ICON_KEY(lesson);\n      const isPinned = s.pinnedIds.includes(s.currentLessonIndex);\n      const isSubscribed = s.currentUser && s.currentUser.profile_tier && s.currentUser.profile_tier !== 'free';\n      const isFreeLesson = lesson.isFree === true;\n      const showPaywall = !isFreeLesson && !isSubscribed;\n      const audioFiles = lesson.audioUrls ? lesson.audioUrls : (lesson.audioUrl ? [{ label: 'Audio', url: lesson.audioUrl }] : []);\n      const videoLinks = (lesson.links || []).filter(l => l.url.includes('youtube') || l.url.includes('youtu.be') || l.url.includes('vimeo'))\n        .map(l => ({ ...l, printable: l.url.replace('https://www.', '').replace('https://', '') }));\n      lessonVals = {\n        lesson: {\n          title: lesson.title,\n          categoryLabel: lesson.categoryLabel,\n          mediaType: (lesson.mediaType || '').replace('&amp;', '&'),\n          levelLabel: lesson.levelLabel,\n          duration: lesson.duration,\n          artBg: ART_BG[key] || ART_BG.general,\n          imgSrc: lesson.visualSource || '',\n          ...iconFlags(key),\n          objectives: lesson.objectives || [],\n          description: lesson.description,\n          pinLabel: isPinned ? 'Pinned!' : 'Pin it!',\n          pinColor: isPinned ? '#56633f' : '#c67139',\n          pinFill: isPinned ? '#56633f' : 'none',\n          rarUrl: lesson.rarUrl,\n          pdfUrl: lesson.pdfUrl,\n          audioFiles,\n          videoLinks,\n          hasVideos: videoLinks.length > 0,\n          showPaywall,\n          showDownloads: !showPaywall\n        }\n      };\n    }\n\n    let authVals = {};\n    {\n      const mode = s.authMode;\n      authVals = {\n        authModeIsCore: mode === 'signin' || mode === 'signup',\n        isSignupMode: mode === 'signup',\n        isForgotMode: mode === 'forgot',\n        isResetMode: mode === 'reset',\n        tabSigninStyle: `flex:1;padding:10px;border:none;background:${mode === 'signin' ? '#fff' : 'transparent'};border-radius:8px;font-size:14.5px;font-weight:700;cursor:pointer;color:${mode === 'signin' ? '#201e1d' : '#a19786'};box-shadow:${mode === 'signin' ? '0 2px 8px rgba(0,0,0,0.1)' : 'none'};`,\n        tabSignupStyle: `flex:1;padding:10px;border:none;background:${mode === 'signup' ? '#fff' : 'transparent'};border-radius:8px;font-size:14.5px;font-weight:700;cursor:pointer;color:${mode === 'signup' ? '#201e1d' : '#a19786'};box-shadow:${mode === 'signup' ? '0 2px 8px rgba(0,0,0,0.1)' : 'none'};`,\n        authPassInputType: s.authPassVisible ? 'text' : 'password',\n        authSubmitLabel: s.authSubmitting ? 'Please wait…' : (mode === 'signin' ? 'Sign In' : 'Create Account'),\n        authSwitchPrompt: mode === 'signin' ? \"Don't have an account?\" : 'Already have an account?',\n        authSwitchLinkText: mode === 'signin' ? 'Sign Up' : 'Sign In',\n        authSwitchAction: () => this.switchTab(mode === 'signin' ? 'signup' : 'signin'),\n        switchToSignin: () => this.switchTab('signin'),\n        switchToSignup: () => this.switchTab('signup'),\n        onAuthEmailChange: (e) => this.setState({ authEmailVal: e.target.value }),\n        onAuthPasswordChange: (e) => this.setState({ authPasswordVal: e.target.value }),\n        onAuthConfirmChange: (e) => this.setState({ authConfirmVal: e.target.value }),\n        onForgotEmailChange: (e) => this.setState({ forgotEmailVal: e.target.value }),\n        onNewPasswordChange: (e) => this.setState({ newPasswordVal: e.target.value }),\n        onNewPasswordConfirmChange: (e) => this.setState({ newPasswordConfirmVal: e.target.value })\n      };\n    }\n\n    const userTier = s.currentUser ? (s.currentUser.profile_tier || 'free') : null;\n    const subLabelMap = { free: 'Guest', contributor: 'Contributor', friend: 'Friend' };\n    const subColorMap = { free: 'background:#f0f0f0;color:#666;', contributor: 'background:#fff0d6;color:#b2622d;', friend: 'background:#f0fae1;color:#3d472b;' };\n\n    return {\n      view: s.view,\n      showDashboard: s.view === 'dashboard',\n      showDetail: s.view === 'detail',\n      showPricing: s.view === 'pricing',\n      showContacts: s.view === 'contacts',\n      showPinned: s.view === 'pinned',\n      isMobile: s.isMobile,\n      hideImgOnError: (e) => {\n        const img = e.target;\n        if (img.dataset.retried) { img.style.display = 'none'; return; }\n        img.dataset.retried = '1';\n        const src = img.getAttribute('src') || '';\n        let alt = src;\n        if (src.endsWith('.JPG')) alt = src.slice(0, -4) + '.jpg';\n        else if (src.endsWith('.jpg')) alt = src.slice(0, -4) + '.JPG';\n        else if (src.endsWith('.jpeg')) alt = src.slice(0, -5) + '.JPG';\n        else if (src.endsWith('.PNG')) alt = src.slice(0, -4) + '.png';\n        else if (src.endsWith('.png')) alt = src.slice(0, -4) + '.PNG';\n        if (alt !== src) img.src = alt; else img.style.display = 'none';\n      },\n      desktopNavStyle: s.isMobile ? 'display:none;' : 'display:flex;align-items:center;gap:4px;',\n      mobileDrawerVisible: s.isMobile && s.mobileMenuOpen,\n      mobileMenuOpen: s.mobileMenuOpen,\n      toggleMobileMenu: this.toggleMobileMenu,\n      closeMobileMenu: this.closeMobileMenu,\n      mobFree: () => { this.applyTopicFilter('free'); },\n      mobContacts: this.showContactsView,\n      mobPricing: this.showPricingView,\n      mobPinned: this.showPinnedView,\n      mobLogin: this.openAuthModal,\n      showDashboardView: this.showDashboardView,\n      showPricingView: this.showPricingView,\n      showContactsView: this.showContactsView,\n      showPinnedView: this.showPinnedView,\n      goBackToCatalog: this.goBackToCatalog,\n      pinnedCount: s.pinnedIds.length,\n      currentUser: s.currentUser,\n      noUser: !s.currentUser,\n      pinnedNotEmpty: s.pinnedIds.length > 0,\n      userEmailShort: s.currentUser ? (s.currentUser.email.length > 18 ? s.currentUser.email.slice(0, 18) + '…' : s.currentUser.email) : '',\n      currentUserEmail: s.currentUser ? s.currentUser.email : '',\n      subStatusLabel: subLabelMap[userTier] || 'Guest',\n      subStatusStyle: `display:inline-block;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;${subColorMap[userTier] || subColorMap.free}`,\n      toggleUserMenu: this.toggleUserMenu,\n      userMenuOpen: s.userMenuOpen,\n      handleSignOut: this.handleSignOut,\n      openAuthModal: this.openAuthModal,\n      ...topicStyles, ...levelStyles, topicHandlers, levelHandlers,\n      sectionTitle: pageLessons.length === 0 ? 'No matching lessons found' : 'Latest Lessons',\n      pageLessons,\n      showPagination: totalPages > 1,\n      paginationItems: totalPages > 1 ? this.buildPagination(page, totalPages, this.goToPage) : [],\n      pinnedEmpty: s.pinnedIds.length === 0,\n      pinnedLessons,\n      showPinnedPagination: pinnedTotalPages > 1,\n      pinnedPaginationItems: pinnedTotalPages > 1 ? this.buildPagination(pinnedPage, pinnedTotalPages, this.pinnedGoToPage) : [],\n      ...lessonVals,\n      pdfBoxRef: this.pdfBoxRef,\n      togglePin: this.togglePin,\n      pinAnimTick: s.pinAnimTick,\n      openShareModal: this.openShareModal,\n      shareOpen: s.shareOpen,\n      closeShareModal: this.closeShareModal,\n      copyShareLink: this.copyShareLink,\n      copyBtnLabel: s.copyBtnLabel,\n      shareUrl: s.currentLessonIndex !== null ? `${window.location.origin}${window.location.pathname}#lesson-${s.currentLessonIndex}` : '',\n      shareTelegramUrl: (s.currentLessonIndex !== null && typeof lessonsCatalog !== 'undefined' && lessonsCatalog[s.currentLessonIndex]) ? `https://t.me/share/url?url=${encodeURIComponent(window.location.origin + window.location.pathname + '#lesson-' + s.currentLessonIndex)}&text=${encodeURIComponent(lessonsCatalog[s.currentLessonIndex].title)}` : '#',\n      shareWhatsappUrl: s.currentLessonIndex !== null ? `https://wa.me/?text=${encodeURIComponent(window.location.origin + window.location.pathname + '#lesson-' + s.currentLessonIndex)}` : '#',\n      shareXUrl: s.currentLessonIndex !== null ? `https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.origin + window.location.pathname + '#lesson-' + s.currentLessonIndex)}` : '#',\n      authOpen: s.authOpen,\n      authError: s.authError,\n      authSuccess: s.authSuccess,\n      authSubmitting: s.authSubmitting,\n      closeAuthModal: this.closeAuthModal,\n      showForgotPassword: this.showForgotPassword,\n      showSignInForm: this.showSignInForm,\n      toggleAuthPassVisible: this.toggleAuthPassVisible,\n      authEmailVal: s.authEmailVal, authPasswordVal: s.authPasswordVal, authConfirmVal: s.authConfirmVal,\n      forgotEmailVal: s.forgotEmailVal, newPasswordVal: s.newPasswordVal, newPasswordConfirmVal: s.newPasswordConfirmVal,\n      handleAuth: this.handleAuth, handleForgotPassword: this.handleForgotPassword, handleSetNewPassword: this.handleSetNewPassword,\n      ...authVals,\n      pricingGuestLabel: !s.currentUser ? 'Join the Community' : (userTier === 'free' || !userTier ? \"You're In!\" : 'Go Home'),\n      pricingGuestStyle: `width:100%;padding:14px;border-radius:999px;font-size:15px;font-weight:800;cursor:pointer;border:2px solid #56633f;background:${s.currentUser ? '#f0fae1' : '#fff'};color:#56633f;font-family:'Caprasimo',serif;`,\n      pricingContributorLabel: !s.currentUser ? 'Start Teaching' : (userTier === 'contributor' || userTier === 'friend' ? 'Active' : 'Start Teaching'),\n      pricingContributorStyle: `width:100%;padding:14px;border-radius:999px;font-size:15px;font-weight:800;cursor:pointer;border:none;background:${userTier === 'contributor' || userTier === 'friend' ? '#f0fae1' : '#201e1d'};color:${userTier === 'contributor' || userTier === 'friend' ? '#3d472b' : '#fff'};font-family:'Caprasimo',serif;`,\n      pricingFriendLabel: !s.currentUser ? 'Get Full Access' : (userTier === 'friend' ? 'Active Plan' : 'Get Full Access'),\n      pricingFriendStyle: `width:100%;padding:14px;border-radius:999px;font-size:15px;font-weight:800;cursor:pointer;border:none;background:${userTier === 'friend' ? '#f0fae1' : '#56633f'};color:${userTier === 'friend' ? '#3d472b' : '#fff'};font-family:'Caprasimo',serif;`,\n      pricingGuestClick: () => this.handlePricingClick('guest'),\n      pricingContributorClick: () => this.handlePricingClick('contributor'),\n      pricingFriendClick: () => this.handlePricingClick('friend')\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
